<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Discussions — CopperOS</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .discussion-wrap{max-width:900px;margin:28px auto;padding:18px}
    .user-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
    .post{border:1px solid #e6e6e6;padding:12px;margin-bottom:12px;border-radius:6px}
    .post .meta{font-size:13px;color:#666;margin-bottom:8px}
    .controls button{margin-right:6px}
    .new-post{margin-bottom:18px}
    .btn.small{padding:6px 8px;font-size:14px}
  </style>
</head>
<body>
  <nav class="topnav" aria-label="Primary navigation">
    <a href="../index.html">Home</a>
    <a href="../try.html">Try it</a>
    <a href="../download-release.html">Download</a>
    <a href="../faq.html">FAQ</a>
    <a href="https://github.com/Aladeltaios/CopperOS-entire-system" target="_blank" rel="noopener noreferrer">Source</a>
  </nav>

  <main class="discussion-wrap">
    <h1>Community Discussions</h1>
    <div id="userArea" class="user-row">
      <!-- Filled by script -->
    </div>

    <section class="new-post">
      <h2>New discussion</h2>
      <div>
        <input id="postTitle" placeholder="Title" style="width:100%;padding:8px;margin-bottom:8px">
        <textarea id="postContent" placeholder="Write your post..." rows="4" style="width:100%;padding:8px"></textarea>
        <div style="margin-top:8px">
          <button id="publishBtn" class="btn">Publish</button>
          <button id="clearBtn" class="btn secondary">Clear</button>
        </div>
      </div>
    </section>

    <section id="posts">
      <!-- Posts injected here -->
    </section>
  </main>

  <footer style="max-width:900px;margin:24px auto;padding:8px;color:#666">
    <p>Posts are stored in your browser's storage for this demo.</p>
  </footer>

  <script src="scripts/discussions.js"></script>
</body>
</html>
